# ═════════════════════════════════════════════════════════════
# Components
# ═════════════════════════════════════════════════════════════
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        SHA-256 hashed token matched against the `companion_agents` table.
        Pass via `Authorization: Bearer {token}`.

  # ── Parameters ────────────────────────────────────────────
  parameters:
    ModelName:
      name: model
      in: path
      required: true
      description: Model short name or fully-qualified class name
      schema:
        type: string
      example: User

    FailedJobId:
      name: id
      in: path
      required: true
      description: Failed job ID
      schema:
        type: string

    CacheKey:
      name: key
      in: path
      required: true
      description: Cache key
      schema:
        type: string

  # ── Reusable Responses ───────────────────────────────────
  responses:
    Unauthenticated:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

    Forbidden:
      description: Insufficient scope or feature disabled
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  # ── Schemas ──────────────────────────────────────────────
  schemas:
    Meta:
      type: object
      required: [environment, laravel_version, php_version, companion_version, timestamp]
      properties:
        environment:
          type: string
        laravel_version:
          type: string
        php_version:
          type: string
        companion_version:
          type: string
        timestamp:
          type: string
          format: date-time

    Pagination:
      type: object
      required: [current_page, last_page, per_page, total]
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    SuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          $ref: "#/components/schemas/Meta"

    PaginatedEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta:
          allOf:
            - $ref: "#/components/schemas/Meta"
            - type: object
              required: [pagination]
              properties:
                pagination:
                  $ref: "#/components/schemas/Pagination"

    ErrorEnvelope:
      type: object
      required: [error, meta]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
        meta:
          type: object
          required: [timestamp]
          properties:
            timestamp:
              type: string
              format: date-time

    # ── Domain Schemas ────────────────────────────────────
    EnvironmentData:
      type: object
      required: [app_name, environment, debug, url, timezone, locale, php_version, laravel_version, drivers]
      properties:
        app_name:
          type: string
        environment:
          type: string
        debug:
          type: boolean
        url:
          type: string
          format: uri
        timezone:
          type: string
        locale:
          type: string
        php_version:
          type: string
        laravel_version:
          type: string
        drivers:
          type: object
          properties:
            database:
              type: string
            cache:
              type: string
            queue:
              type: string
            mail:
              type: string
            session:
              type: string

    ModelMetadata:
      type: object
      required: [class, short_name, table, timestamps, fillable, casts, relationships, soft_deletes]
      properties:
        class:
          type: string
          description: Fully-qualified class name
        short_name:
          type: string
        table:
          type: string
        timestamps:
          type: boolean
        fillable:
          type: array
          items:
            type: string
        casts:
          type: object
          additionalProperties:
            type: string
        relationships:
          type: array
          items:
            type: object
            additionalProperties: true
        soft_deletes:
          type: boolean

    RouteEntry:
      type: object
      required: [methods, uri, name, action, middleware]
      properties:
        methods:
          type: array
          items:
            type: string
        uri:
          type: string
        name:
          type: ["string", "null"]
        action:
          type: string
        middleware:
          type: array
          items:
            type: string
        domain:
          type: ["string", "null"]
        parameters:
          type: array
          items:
            type: string

    CommandEntry:
      type: object
      required: [name, description, arguments, options]
      properties:
        name:
          type: string
        description:
          type: string
        arguments:
          type: array
          items:
            type: object
            required: [name, description, required]
            properties:
              name:
                type: string
              description:
                type: string
              required:
                type: boolean
              default:
                type: ["string", "null"]
        options:
          type: array
          items:
            type: object
            required: [name, description, value_required]
            properties:
              name:
                type: string
              shortcut:
                type: ["string", "null"]
              description:
                type: string
              default: {}
              value_required:
                type: boolean

    FailedJobSummary:
      type: object
      required: [id, uuid, connection, queue, exception, failed_at]
      properties:
        id:
          type: integer
        uuid:
          type: string
        connection:
          type: string
        queue:
          type: string
        exception:
          type: string
          description: Truncated to 500 characters
        failed_at:
          type: string
          format: date-time

    FailedJobDetail:
      type: object
      required: [id, uuid, connection, queue, exception, payload, failed_at]
      properties:
        id:
          type: integer
        uuid:
          type: string
        connection:
          type: string
        queue:
          type: string
        exception:
          type: string
          description: Full exception text
        payload:
          type: object
          additionalProperties: true
        failed_at:
          type: string
          format: date-time

    LogFile:
      type: object
      required: [name, size, size_human, last_modified]
      properties:
        name:
          type: string
        size:
          type: integer
          description: Size in bytes
        size_human:
          type: string
        last_modified:
          type: string
          format: date-time

    LogEntry:
      type: object
      required: [level, datetime, channel, message]
      properties:
        level:
          type: string
        datetime:
          type: string
          format: date-time
        channel:
          type: string
        message:
          type: string
        context:
          type: ["object", "null"]
          additionalProperties: true
        stack_trace:
          type: ["string", "null"]

    ScheduleEntry:
      type: object
      required: [command, expression, description, timezone, without_overlapping, on_one_server, next_due]
      properties:
        command:
          type: string
        expression:
          type: string
          description: Cron expression
        description:
          type: string
        timezone:
          type: string
        without_overlapping:
          type: boolean
        on_one_server:
          type: boolean
        next_due:
          type: object
          required: [local, utc]
          properties:
            local:
              type: string
              format: date-time
            utc:
              type: string
              format: date-time

    EventEntry:
      type: object
      required: [event, listeners]
      properties:
        event:
          type: string
          description: Event class name
        listeners:
          type: array
          items:
            type: object
            required: [class, queued]
            properties:
              class:
                type: string
              queued:
                type: boolean
